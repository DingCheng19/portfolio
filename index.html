<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Apps Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Sample Apps Portfolio</h1>
      <p class="lead">
        個人開発・サンプルアプリの一覧です。各プロジェクトの概要、使用技術、
        GitHub リポジトリへのリンクをまとめています。
      </p>
      <div class="links">
        <a class="button" href="https://github.com/DingCheng19" target="_blank" rel="noopener noreferrer">GitHub Profile</a>
        <a class="button secondary" href="mailto:dingcheng.19891102@gmail.com">Contact</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section>
      <h2>Projects</h2>
      <div id="project-list" class="grid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 DING_CHENG Portfolio</p>
    </div>
  </footer>

  <script>
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createMetaRow(label, value, extraClass = "") {
      if (!value) return "";
      return `
        <div class="meta-row">
          <span class="meta-label">${escapeHtml(label)}</span>
          <span class="meta-value ${extraClass}">${escapeHtml(value)}</span>
        </div>
      `;
    }

    async function loadProjects() {
      const container = document.getElementById('project-list');

      try {
        const response = await fetch('./projects.json');
        const projects = await response.json();

        container.innerHTML = projects.map(project => {
          const platformClass = project.platform
            ? `platform-${project.platform.toLowerCase()}`
            : "";

          return `
            <article class="card">
              <h3>${escapeHtml(project.title)}</h3>
              <p class="card-description">${escapeHtml(project.description)}</p>

              <div class="meta-list">
                ${createMetaRow("Platform", project.platform || "", platformClass)}
                ${createMetaRow("Tech", (project.tech || []).join(', '))}
                ${createMetaRow("Architecture", project.architecture || "")}
              </div>

              <div class="meta-block">
                <div class="meta-heading">Features</div>
                <ul>
                  ${(project.features || project.highlights || []).map(item => `
                    <li>${escapeHtml(item)}</li>
                  `).join('')}
                </ul>
              </div>

              ${project.highlights && project.features ? `
                <div class="meta-block">
                  <div class="meta-heading">Highlights</div>
                  <ul>
                    ${project.highlights.map(item => `
                      <li>${escapeHtml(item)}</li>
                    `).join('')}
                  </ul>
                </div>
              ` : ''}

              <div class="card-links">
                <a href="${escapeHtml(project.github)}" target="_blank" rel="noopener noreferrer">GitHub</a>
                ${project.demo ? `<a href="${escapeHtml(project.demo)}" target="_blank" rel="noopener noreferrer">Demo</a>` : ''}
              </div>
            </article>
          `;
        }).join('');
      } catch (error) {
        container.innerHTML = `
          <div class="card">
            <h3>読み込みエラー</h3>
            <p>projects.json の読み込みに失敗しました。ファイルの場所や JSON の形式を確認してください。</p>
          </div>
        `;
      }
    }

    loadProjects();
  </script>
</body>
</html>
